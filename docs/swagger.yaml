info:
  contact: {}
  description: Go modular monolith backend for emergency alert intake, ambulance dispatch,
    user management, and fleet readiness.
  title: Dispatch Backend API
  version: "1.0"
paths:
  /ambulances:
    get:
      description: Returns paginated ambulances with status and readiness
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search term (code, plate, VIN, make, model)
        in: query
        name: search
        type: string
      - description: Sort field
        enum:
        - created_at
        - plate_number
        - status
        - dispatch_readiness
        in: query
        name: sort_by
        type: string
      - description: Sort order
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      - description: Filter by status
        enum:
        - AVAILABLE
        - RESERVED
        - ASSIGNED
        - ENROUTE
        - AT_SCENE
        - TRANSPORTING
        - RETURNING
        - MAINTENANCE
        - BREAKDOWN
        - OFFLINE
        - RETIRED
        in: query
        name: filter[status]
